<svg width="960" height="200" viewBox="0 0 960 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08090d"/>
      <stop offset="100%" stop-color="#111422"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d4d8f0"/>
      <stop offset="100%" stop-color="#6378ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" fill="url(#bg)" rx="12"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#6378ff" stroke-width="1">
    <line x1="0" y1="40" x2="960" y2="40"/>
    <line x1="0" y1="80" x2="960" y2="80"/>
    <line x1="0" y1="120" x2="960" y2="120"/>
    <line x1="0" y1="160" x2="960" y2="160"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
    <line x1="320" y1="0" x2="320" y2="200"/>
    <line x1="480" y1="0" x2="480" y2="200"/>
    <line x1="640" y1="0" x2="640" y2="200"/>
    <line x1="800" y1="0" x2="800" y2="200"/>
    <line x1="880" y1="0" x2="880" y2="200"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="960" height="2" fill="#6378ff" opacity="0.6" rx="1"/>
  <rect x="0" y="198" width="960" height="2" fill="#6378ff" opacity="0.2" rx="1"/>

  <!-- LEFT: START HERE badge -->
  <rect x="40" y="30" width="180" height="28" rx="3" fill="none" stroke="#6378ff" stroke-width="1" opacity="0.6"/>
  <text x="130" y="49" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#6378ff" letter-spacing="2" font-weight="500">⬡ НАЧНИ ОТСЮДА</text>

  <!-- MAIN TITLE -->
  <text x="40" y="115" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="url(#title-grad)" filter="url(#glow)">MASTER-PROMPT</text>
  <text x="640" y="115" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="#6378ff" opacity="0.9" filter="url(#glow)">X60</text>

  <!-- Subtitle -->
  <text x="40" y="145" font-family="'Courier New', monospace" font-size="13" fill="#7a82a8" letter-spacing="1">Агентная архитектура · 12 блоков · 6 когнитивных режимов · 4 уровня агентов</text>

  <!-- RIGHT: Stats -->
  <g font-family="'Courier New', monospace" text-anchor="middle">
    <rect x="720" y="30" width="90" height="50" rx="4" fill="#161928" stroke="#6378ff" stroke-width="0.5" opacity="0.8"/>
    <text x="765" y="52" font-size="22" font-weight="700" fill="#00e5ff">12</text>
    <text x="765" y="70" font-size="9" fill="#7a82a8" letter-spacing="1">БЛОКОВ</text>

    <rect x="820" y="30" width="90" height="50" rx="4" fill="#161928" stroke="#6378ff" stroke-width="0.5" opacity="0.8"/>
    <text x="865" y="52" font-size="22" font-weight="700" fill="#00e5ff">6</text>
    <text x="865" y="70" font-size="9" fill="#7a82a8" letter-spacing="1">РЕЖИМОВ</text>

    <rect x="720" y="90" width="90" height="50" rx="4" fill="#161928" stroke="#6378ff" stroke-width="0.5" opacity="0.8"/>
    <text x="765" y="112" font-size="22" font-weight="700" fill="#00e5ff">4</text>
    <text x="765" y="130" font-size="9" fill="#7a82a8" letter-spacing="1">УРОВНЯ</text>

    <rect x="820" y="90" width="90" height="50" rx="4" fill="#161928" stroke="#6378ff" stroke-width="0.5" opacity="0.8"/>
    <text x="865" y="112" font-size="22" font-weight="700" fill="#00ff9d">v2</text>
    <text x="865" y="130" font-size="9" fill="#7a82a8" letter-spacing="1">VERSION</text>
  </g>

  <!-- Bottom bar -->
  <text x="40" y="180" font-family="'Courier New', monospace" font-size="10" fill="#3d4468" letter-spacing="1">okbot.space · novopoltsev-ai.ru · Pavel Novopoltsev · 2025</text>
  <text x="920" y="180" text-anchor="end" font-family="'Courier New', monospace" font-size="10" fill="#6378ff" opacity="0.5">● ACTIVE</text>
</svg>
